name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  console:
    name: check / test / image smoke (${{ matrix.generation }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        generation: [legacy, v2]
    steps:
      - name: Checkout source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false

      - name: Build tested image
        env:
          GENERATION: ${{ matrix.generation }}
          SOURCE_SHA: ${{ github.sha }}
        run: >-
          docker build
          --build-arg VITE_CONSOLE_UI_GENERATION="$GENERATION"
          --build-arg OCI_REVISION="$SOURCE_SHA"
          --build-arg OCI_VERSION="sha-$SOURCE_SHA"
          --tag "omniwa-console:ci-$GENERATION"
          .

      - name: Smoke test image
        env:
          GENERATION: ${{ matrix.generation }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          image="omniwa-console:ci-$GENERATION"
          container_id="$(docker run --detach --rm --publish 127.0.0.1::8080 "$image")"
          trap 'docker stop "$container_id" >/dev/null 2>&1 || true' EXIT
          host_port="$(docker port "$container_id" 8080/tcp | awk -F: '{ print $NF }')"
          for attempt in $(seq 1 20); do
            if curl --silent --fail "http://127.0.0.1:$host_port/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          test "$(curl --silent "http://127.0.0.1:$host_port/healthz")" = ok
          routes='/connect /events'
          if [ "$GENERATION" = v2 ]; then
            routes="$routes /recovery /instances /chats /groups /campaigns"
          else
            routes="$routes /queue /webhooks /settings /settings/api-keys"
          fi
          for route in $routes; do
            curl --silent --fail "http://127.0.0.1:$host_port$route" | grep -F '<div id="root"></div>'
          done
          entrypoint="$(curl --silent --fail "http://127.0.0.1:$host_port/" | sed -n 's/.*src="\([^"]*\.js\)".*/\1/p')"
          test -n "$entrypoint"
          curl --silent --fail "http://127.0.0.1:$host_port$entrypoint" >/dev/null
          test "$(docker exec "$container_id" id -u)" = 101
          test "$(docker image inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "$SOURCE_SHA"
          test "$(docker image inspect "$image" --format '{{ index .Config.Labels "cc.onio.console.ui-generation" }}')" = "$GENERATION"

  publish:
    name: publish immutable image (${{ matrix.generation }})
    needs: console
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'hiepknor/omniwa-console'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - generation: legacy
            tag_suffix: ''
          - generation: v2
            tag_suffix: '-v2'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/hiepknor/omniwa-console
    steps:
      - name: Checkout verified source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=console-${{ matrix.generation }}
          cache-to: type=gha,mode=max,scope=console-${{ matrix.generation }}
          sbom: true
          provenance: mode=max
          build-args: |
            VITE_CONSOLE_UI_GENERATION=${{ matrix.generation }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=sha-${{ github.sha }}

      - name: Resolve and verify immutable digest
        env:
          GENERATION: ${{ matrix.generation }}
          SOURCE_SHA: ${{ github.sha }}
          TAG_SUFFIX: ${{ matrix.tag_suffix }}
        run: |
          image_ref="$IMAGE_NAME:sha-$SOURCE_SHA$TAG_SUFFIX"
          digest="$(docker buildx imagetools inspect "$image_ref" | awk '$1 == "Digest:" { print $2; exit }')"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          docker pull --quiet --platform linux/amd64 "$IMAGE_NAME@$digest"
          test "$(docker image inspect "$IMAGE_NAME@$digest" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "$SOURCE_SHA"
          test "$(docker image inspect "$IMAGE_NAME@$digest" --format '{{ index .Config.Labels "cc.onio.console.ui-generation" }}')" = "$GENERATION"
          test "$(docker image inspect "$IMAGE_NAME@$digest" --format '{{ .Config.User }}')" = 101
          {
            echo "### Immutable Console image ($GENERATION)"
            printf '%c%s@%s%c\n' 96 "$IMAGE_NAME" "$digest" 96
            printf 'Source revision: %c%s%c\n' 96 "$SOURCE_SHA" 96
            printf 'UI generation: %c%s%c\n' 96 "$GENERATION" 96
          } >> "$GITHUB_STEP_SUMMARY"
